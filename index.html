<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Kanto Pokédex</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Interactive Pokédex with camera scan and multilingual support">
    <meta name="theme-color" content="#cc0000">
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div id="volumeBar">
      <span id="volumeIcon">🔊</span>
      <div id="volumeBarTrack">
        <div id="volumeBarFill"></div>
      </div>
    </div>
    <div class="pokedex-viewport">
      <div class="pokedex">
        <!-- LEFT PANEL -->
        <div class="left-panel">
          <svg
            class="panel-bg"
            viewBox="0 0 440 500"
            preserveAspectRatio="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <rect width="440" height="500" fill="#d62828" />
            <path
              d="M0 0 L440 0 L440 60 L280 60 C240 60 160 120 110 120 L0 120 Z"
              fill="#b71c1c"
            />
          </svg>

          <div class="left-panel-top">
            <div class="camera"></div>
            <div class="lights">
              <div class="light red"></div>
              <div class="light yellow"></div>
              <div class="light green"></div>
            </div>
          </div>

          <button
            class="nav-arrow nav-arrow-right"
            aria-label="View info panel"
          >
            <svg viewBox="0 0 64 64" width="44" height="44">
              <polyline points="14,12 54,34 14,56" fill="none" stroke="#1a1a1a" stroke-width="18" stroke-linejoin="round" stroke-linecap="butt"/>
              <polyline points="12,10 52,32 12,54" fill="none" stroke="#666" stroke-width="18" stroke-linejoin="round" stroke-linecap="butt"/>
            </svg>
          </button>

          <div class="left-panel-content">
            <div class="screen-frame">
              <svg
                class="screen-frame-bg"
                viewBox="0 0 300 220"
                xmlns="http://www.w3.org/2000/svg"
                preserveAspectRatio="none"
              >
                <path
                  d="M20 0 H280 Q300 0 300 20 V200 Q300 220 280 220 H50 L0 190 V20 Q0 0 20 0 Z"
                  fill="#ccc"
                />
                <!-- Two indicator dots top center -->
                <circle cx="136" cy="11" r="5" fill="#d62828"/>
                <circle cx="136" cy="11" r="2" fill="#ff6b6b"/>
                <circle cx="164" cy="11" r="5" fill="#d62828"/>
                <circle cx="164" cy="11" r="2" fill="#ff6b6b"/>
                <!-- Red circle button bottom-left (shiny toggle) -->
                <g id="shinyBtn" style="cursor:pointer">
                  <circle cx="70" cy="199" r="10" fill="#b71c1c"/>
                  <circle cx="70" cy="199" r="10" fill="none" stroke="#8a1010" stroke-width="1.5"/>
                  <circle cx="66" cy="195" r="3.5" fill="rgba(255,255,255,0.3)"/>
                </g>
                <!-- Speaker slots bottom-right -->
                <line x1="190" y1="191" x2="268" y2="191" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
                <line x1="190" y1="198" x2="268" y2="198" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
                <line x1="190" y1="205" x2="268" y2="205" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
                <line x1="190" y1="212" x2="268" y2="212" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
              </svg>
              <div class="screen">
                <img id="pokemonImage" src="" alt="Pokémon artwork" />
                <p id="screenText" aria-live="polite">Select a Pokemon</p>
                <video id="cameraFeed" autoplay playsinline muted></video>
                <canvas id="cameraCanvas" style="display:none;"></canvas>
                <p id="cameraStatus"></p>
                <div id="cameraLockBar"><div id="cameraLockFill"></div></div>
              </div>
            </div>

            <div class="bottom-controls">
              <div class="bottom-left">
                <div class="bottom-row1">
                  <button id="cryBtn" title="Play Pokémon cry" aria-label="Play Pokémon cry"></button>
                  <button id="volDownBtn">&#x1F50A;−</button>
                  <button id="volUpBtn">&#x1F50A;+</button>
                </div>
                <div class="bottom-row2">
                  <select id="voiceSelect"></select>
                  <select id="langSelect"></select>
                </div>
              </div>
              <div class="bottom-right">
                <div class="dpad">
                  <button class="dpad-btn dpad-up" id="dpadUp" aria-label="Previous 10 Pokémon"></button>
                  <button class="dpad-btn dpad-left" id="dpadLeft" aria-label="Previous Pokémon"></button>
                  <div class="dpad-center"><div class="dpad-center-dot"></div></div>
                  <button class="dpad-btn dpad-right" id="dpadRight" aria-label="Next Pokémon"></button>
                  <button class="dpad-btn dpad-down" id="dpadDown" aria-label="Next 10 Pokémon"></button>
                </div>
              </div>
            </div>

            <div class="controls">
              <input
                type="text"
                id="pokemonInput"
                placeholder="Enter name or ID"
              />
              <button id="searchBtn">Search</button>
            </div>
          </div>
        </div>

        <!-- HINGE -->
        <div class="hinge"></div>

        <!-- RIGHT PANEL -->
        <div class="right-panel">
          <svg
            class="panel-bg"
            viewBox="0 0 440 500"
            preserveAspectRatio="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M0 60 L160 60 C200 60 280 120 330 120 L440 120 L440 500 L0 500 Z"
              fill="#d62828"
            />
          </svg>

          <div class="right-panel-content">
            <button
              class="nav-arrow nav-arrow-left"
              aria-label="Back to Pokédex"
            >
              <svg viewBox="0 0 64 64" width="44" height="44">
                <polyline points="50,12 10,34 50,56" fill="none" stroke="#1a1a1a" stroke-width="18" stroke-linejoin="round" stroke-linecap="butt"/>
                <polyline points="52,10 12,32 52,54" fill="none" stroke="#666" stroke-width="18" stroke-linejoin="round" stroke-linecap="butt"/>
              </svg>
            </button>
            <div class="info-screen">
              <div class="info-screen-content">
              <div id="menuView" style="display:none">
                <button class="menu-option" id="menuPokedexBtn">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 20" width="20" height="25">
                    <rect x="1" y="0.5" width="14" height="10.5" rx="2" fill="rgba(255,255,255,0.85)"/>
                    <rect x="3" y="2" width="10" height="7" rx="1" fill="rgba(0,0,0,0.4)"/>
                    <rect x="1" y="11.5" width="14" height="0.5" fill="rgba(0,0,0,0.2)"/>
                    <rect x="1" y="12" width="14" height="7.5" rx="2" fill="rgba(255,255,255,0.85)"/>
                    <circle cx="4.5" cy="15.5" r="1.8" fill="rgba(0,0,0,0.3)"/>
                    <line x1="8.5" y1="14.5" x2="13.5" y2="14.5" stroke="rgba(0,0,0,0.3)" stroke-width="0.8" stroke-linecap="round"/>
                    <line x1="8.5" y1="16.5" x2="13.5" y2="16.5" stroke="rgba(0,0,0,0.3)" stroke-width="0.8" stroke-linecap="round"/>
                  </svg>
                  <span>Pokédex</span>
                </button>
                <button class="menu-option" id="menuAchievementsBtn">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="22" height="22">
                    <path d="M5 2 L19 2 L19 11 C19 15.5 15.5 18.5 12 19.5 C8.5 18.5 5 15.5 5 11 Z" fill="rgba(255,255,255,0.85)"/>
                    <path d="M5 5 L2 5 L2 9 C2 11.5 3.5 12.5 5 12" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="1.5" stroke-linecap="round"/>
                    <path d="M19 5 L22 5 L22 9 C22 11.5 20.5 12.5 19 12" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="1.5" stroke-linecap="round"/>
                    <line x1="12" y1="19.5" x2="12" y2="22" stroke="rgba(255,255,255,0.85)" stroke-width="1.8" stroke-linecap="round"/>
                    <rect x="8" y="22" width="8" height="2" rx="1" fill="rgba(255,255,255,0.85)"/>
                    <path d="M12 6 L13 9 L16 9 L13.5 10.8 L14.5 13.8 L12 12 L9.5 13.8 L10.5 10.8 L8 9 L11 9 Z" fill="rgba(255,220,0,0.9)"/>
                  </svg>
                  <span>Achievements</span>
                </button>
              </div>
              <div id="pokemonView" style="display:none">
                <h2 id="pokemonName">---</h2>
                <p id="pokemonDescription">---</p>
                <p><strong>ID:</strong> <span id="pokemonId">---</span></p>
                <p><strong>Type:</strong> <span id="pokemonType">---</span></p>
              </div>
              <div id="boxView" style="display:none">
                <div id="boxViewHeader">
                  <span id="boxViewTitle"></span>
                  <span id="boxViewCount"></span>
                </div>
                <div id="boxViewList"></div>
              </div>
              <div id="searchView" style="display:none">
                <div id="searchViewHeader">
                  <span id="searchViewLabel">Results</span>
                  <span id="searchViewCount"></span>
                </div>
                <div id="searchViewList"></div>
              </div>
              <div id="pokedexView" style="display:none">
                <div id="pokedexViewHeader">
                  <span id="pokedexViewLabel">Pokédex</span>
                  <span id="pokedexViewCount"></span>
                </div>
                <div id="pokedexViewList"></div>
              </div>
              <div id="achievementsView" style="display:none">
                <div id="achievementsViewHeader">
                  <span id="achievementsViewLabel">Achievements</span>
                </div>
                <div id="achievementsGrid"></div>
              </div>
              <div id="medalDetailView" style="display:none">
                <div id="medalDetailSvg"></div>
                <div id="medalDetailType"></div>
                <div id="medalDetailTitle"></div>
                <div class="medal-detail-divider"></div>
                <div id="medalDetailProgress"></div>
                <div class="medal-detail-bar">
                  <div class="medal-detail-bar-fill" id="medalDetailBarFill"></div>
                </div>
                <div class="medal-detail-divider"></div>
                <div id="medalDetailCriteria"></div>
              </div>
              </div><!-- end info-screen-content -->
              <button id="pokedexBackArrowBtn" aria-label="Back to menu" class="pokedex-back-btn" style="display:none">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="14" height="14">
                  <path d="M10 3 C6 3 3 5.5 3 8 C3 10.5 5 12.5 7.5 13 L7.5 11 C5.5 10.5 5 9.5 5 8 C5 6.5 7 5 10 5 L10 7 L14 4.5 L10 2 Z" fill="rgba(255,255,255,0.9)"/>
                </svg>
              </button>
              <button id="pokedexFilterBtn" aria-label="Filter Pokédex" class="pokedex-back-btn" style="display:none">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="14" height="14">
                  <path d="M1 3 L15 3 L10 8 L10 14 L6 12 L6 8 Z" fill="rgba(255,255,255,0.85)" stroke="rgba(255,255,255,0.5)" stroke-width="0.5"/>
                </svg>
              </button>
              <div id="pokedexFilterDropdown" style="display:none">
                <label><input type="radio" name="dexFilter" value="all" checked> All</label>
                <label><input type="radio" name="dexFilter" value="scanned"> Scanned</label>
                <label><input type="radio" name="dexFilter" value="unscanned"> Unscanned</label>
              </div>
              <button id="pokedexBackBtn" aria-label="Back to Pokédex" class="pokedex-back-btn" style="display:none">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 20" width="13" height="17">
                  <rect x="1" y="0.5" width="14" height="10.5" rx="2" fill="rgba(255,255,255,0.85)"/>
                  <rect x="3" y="2" width="10" height="7" rx="1" fill="rgba(0,0,0,0.4)"/>
                  <rect x="1" y="11.5" width="14" height="0.5" fill="rgba(0,0,0,0.2)"/>
                  <rect x="1" y="12" width="14" height="7.5" rx="2" fill="rgba(255,255,255,0.85)"/>
                  <circle cx="4.5" cy="15.5" r="1.8" fill="rgba(0,0,0,0.3)"/>
                  <line x1="8.5" y1="14.5" x2="13.5" y2="14.5" stroke="rgba(0,0,0,0.3)" stroke-width="0.8" stroke-linecap="round"/>
                  <line x1="8.5" y1="16.5" x2="13.5" y2="16.5" stroke="rgba(0,0,0,0.3)" stroke-width="0.8" stroke-linecap="round"/>
                </svg>
              </button>
            </div>

            <div class="storage-grid" id="storageGrid">
              <div class="storage-box" data-slot="0"></div>
              <div class="storage-box" data-slot="1"></div>
              <div class="storage-box" data-slot="2"></div>
              <div class="storage-box" data-slot="3"></div>
              <div class="storage-box" data-slot="4"></div>
              <div class="storage-box" data-slot="5"></div>
              <div class="storage-box" data-slot="6"></div>
              <div class="storage-box" data-slot="7"></div>
              <div class="storage-box" data-slot="8"></div>
              <div class="storage-box" data-slot="9"></div>
            </div>

            <div class="storage-nav">
              <button id="storagePrevBtn" aria-label="Previous storage page"></button>
              <button id="storageNextBtn" aria-label="Next storage page"></button>
            </div>

            <div class="menu-buttons">
              <div class="menu-nav-row">
                <button id="prevBtn"></button>
                <button id="nextBtn"></button>
                <button id="favoriteBtn" aria-label="Favorite"></button>
              </div>
              <div class="menu-stat-row">
                <div class="stat-box" id="pokemonHeight"></div>
                <div class="stat-box" id="pokemonWeight"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

<script src="/static/script.js"></script>
  </body>
</html>
